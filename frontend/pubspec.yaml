name: app
description: Application livreur - frontend Flutter

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Carte interactive
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Géolocalisation
  geolocator: ^11.0.0

  # Graphiques (Mes Gains)
  fl_chart: ^0.68.0

  # Requêtes HTTP (pour plus tard avec le backend)
  dio: ^5.4.0

  # State management
  provider: ^6.1.2

  # Stockage local pour l'authentification
  shared_preferences: ^2.2.2

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true